<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation ❤️</title>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            background-color: #ffc0cb; 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 300px;
            z-index: 10;
        }
        input { 
            width: 80%; 
            padding: 10px; 
            margin: 20px 0; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
        }
        button { 
            background: #ff4d6d; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 10px; 
            cursor: pointer; 
            width: 100%;
        }
        /* Falling Hearts */
        .heart {
            position: absolute;
            color: #ff4d6d;
            top: -20px;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(110vh); }
        }
    </style>
</head>
<body>

    <div id="hearts"></div>

    <div class="container">
        <h2 style="color: #d63384;">Who are you?</h2>
        <input type="text" id="name" placeholder="Name here...">
        <button onclick="start()">Enter</button>
    </div>

    <script>
        // Heart Animation
        setInterval(() => {
            const h = document.createElement('div');
            h.innerHTML = '❤️';
            h.className = 'heart';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.getElementById('hearts').appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 300);

        async function start() {
            const name = document.getElementById('name').value.trim();
            if (!name) return alert("Enter your name!");

            let yes = false;
            while (!yes) {
                const { isConfirmed } = await Swal.fire({
                    title: `Hi ${name}!
    </script>
</body>
</html>
