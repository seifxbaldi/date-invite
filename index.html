<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Invitation ❤️</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        /* 1. CSS - Visuals & Animations */
        body { 
            background-color: #ffc0cb; /* Soft Pink */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            position: relative;
        }

        /* Falling Hearts Background */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            top: -20px;
            user-select: none;
            z-index: -1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* Main Card Container */
        .container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 2.5rem; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 320px; 
            z-index: 10;
        }

        h1 { color: #d63384; margin-bottom: 1.5rem; font-size: 1.8rem; }
        
        input { 
            width: 90%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 2px solid #ffccd5; 
            border-radius: 12px; 
            outline: none; 
            text-align: center;
            font-size: 1rem;
        }

        input:focus { border-color: #ff4d6d; }

        button { 
            background-color: #ff4d6d; 
            color: white; 
            border: none; 
            padding: 14px 25px; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            transition: background 0.3s, transform 0.2s; 
            font-size: 1rem;
        }

        button:hover { 
            background-color: #ef233c; 
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

    <div class="container">
        <h1>Who are you?</h1>
        <input type="text" id="userName" placeholder="Enter your name..." autocomplete="off">
        <button id="startBtn">Enter</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        /* 2. JS - Functionality */

        // Falling Hearts Generator
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.opacity = Math.random();
            document.getElementById('heart-container').appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);

        // Your Formspree Endpoint
        const FORMSPREE_URL = "https://formspree.io/f/xqewqrgv"; 

        document.getElementById('startBtn').addEventListener('click', async () => {
            const nameInput = document.getElementById('userName');
            const name = nameInput.value.trim();
            
            if (!name) {
                return Swal.fire({
                    icon: 'error',
                    title: 'Wait!',
                    text: 'Please enter your name first.',
                    confirmButtonColor: '#ff4d6d'
                });
            }

            // --- STEP 1: The Main Question ---
            const { value: response } = await Swal.fire({
                title: `FOR ${name.toUpperCase()} ❤️`,
                text: "Would you like to be my date?",
                showCancelButton: true,
                confirmButtonText: 'Yes! 😍',
                cancelButtonText: 'No ☹️',
                confirmButtonColor: '#ff4d6d',
                cancelButtonColor: '#ffccd5',
                allowOutsideClick: false
            });

            if (!response) {
                return Swal.fire({
                    title: "Oh no!",
                    text: "Maybe next time? ☹️",
                    confirmButtonColor: '#ff4d6d'
                });
            }

            // --- STEP 2: The Walking Question ---
            const { value: likesWalking } = await Swal.fire({
                title: 'Quick question...',
                text: 'Do you like long walks?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Yes!',
                cancelButtonText: 'Not really',
                confirmButtonColor: '#ff4d6d'
            });

            // --- STEP 3: Vibe Selection (No Dinner) ---
            let dateOptions = {
                'Outdoor Adventure': 'Adventure 🌲',
                'Chill Hangout': 'Chill Hangout 🍿',
                'Surprise Me': 'Surprise Me! 🎁'
            };

            // Add Cafe if they like walking
            if (likesWalking) {
                dateOptions['Cafe Date'] = 'Cute Cafe Date ☕';
            }

            const { value: dateType } = await Swal.fire({
                title: 'Pick a vibe',
                input: 'select',
                inputOptions: dateOptions,
                confirmButtonColor: '#ff4d6d'
            });

            // --- STEP 4: Submit Results ---
            if (dateType) {
                // Send to Formspree
                fetch(FORMSPREE_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        name: name, 
                        likesWalking: likesWalking ? "Yes" : "No", 
                        chosenDate: dateType 
                    }),
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
                });

                // Final Confirmation
                Swal.fire({
                    icon: 'success',
                    title: 'It\'s a Date! ✅',
                    text: `Perfect! I'll see you for our ${dateType}!`,
                    confirmButtonColor: '#ff4d6d'
                });
            }
        });
    </script>
</body>
</html>
    </script>
</body>
</html>
