<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Invitation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <style>
        body { background-color: #87ceeb; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 320px; }
        h1 { color: #1e3a8a; margin-bottom: 1.5rem; }
        input { width: 90%; padding: 12px; margin-bottom: 20px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; }
        button { background-color: #1e3a8a; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Who are you?</h1>
        <input type="text" id="userName" placeholder="Enter your name..." autocomplete="off">
        <button id="startBtn">Enter</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const FORMSPREE_URL = "https://formspree.io/f/xqewqrgv"; // PASTE YOUR ID HERE

        document.getElementById('startBtn').addEventListener('click', async () => {
            const name = document.getElementById('userName').value.trim();
            if (!name) return Swal.fire('Error', 'Tell me your name!', 'error');

            // 1. Invitation
            const { value: accept } = await Swal.fire({
                title: `HI ${name.toUpperCase()}! ❤️`,
                text: "Would you like to be my date?",
                imageUrl: 'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueW94bmZ6eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6JnB0PW0mY3Q9cw/MDJ9u19Xp4GZ2/giphy.gif',
                showCancelButton: true,
                confirmButtonText: 'Yes!',
                cancelButtonText: 'No'
            });

            if (accept) {
                // 2. Walking Question
                const { value: likesWalking } = await Swal.fire({
                    title: 'Quick question...',
                    text: 'Do you like long walks?',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: 'Yes!',
                    cancelButtonText: 'No'
                });

                let dateOptions = {'Outdoor Adventure': 'Adventure', 'Chill Hangout': 'Chill'};
                likesWalking ? dateOptions['Cafe Date'] = 'Cafe' : dateOptions['Romantic Dinner'] = 'Dinner';

                // 3. Date Choice
                const { value: dateType } = await Swal.fire({
                    title: 'Pick a vibe',
                    input: 'select',
                    inputOptions: dateOptions,
                    showCancelButton: true
                });

                if (dateType) {
                    // 4. SEND DATA TO YOU
                    fetch(FORMSPREE_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            name: name,
                            likesWalking: likesWalking ? "Yes" : "No",
                            chosenDate: dateType
                        }),
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
                    });

                    Swal.fire('It\'s a Date! ✅', `I'll see you for our ${dateType}!`, 'success');
                }
            }
        });
    </script>
</body>
</html>
